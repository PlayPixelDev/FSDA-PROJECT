<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechFest 2025 – React Ticket Booking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0eeff;min-height:100vh;color:#1a1a1a}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4A3AB7 0%,#7B68EE 100%);padding:1rem}
.login-card{background:#fff;border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(74,58,183,.25)}
.brand{text-align:center;margin-bottom:2rem}
.brand-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#4A3AB7,#7B68EE);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;color:#fff;font-size:24px;font-weight:700}
.brand h1{font-size:22px;font-weight:700}
.brand p{font-size:13px;color:#777;margin-top:4px}
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
.field input:focus,.field select:focus{border-color:#4A3AB7;box-shadow:0 0 0 3px rgba(74,58,183,.1)}
.field input.err{border-color:#e74c3c;background:#fff8f8}
.field select.err{border-color:#e74c3c}
.err-text{color:#c0392b;font-size:11px;margin-top:4px}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#4A3AB7,#7B68EE);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer}
.demo-box{background:#f0eeff;border-radius:9px;padding:12px 14px;margin-top:1.25rem;font-size:12px;color:#3C3489;line-height:1.8}
.demo-box strong{display:block;margin-bottom:3px;font-size:13px}
.header{background:linear-gradient(90deg,#4A3AB7,#7B68EE);color:#fff;padding:14px 2rem;display:flex;align-items:center;justify-content:space-between}
.header h2{font-size:17px;font-weight:600}
.user-pill{display:flex;align-items:center;gap:10px;font-size:13px}
.avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.5);color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.nav-bar{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 2rem;display:flex}
.nav-tab{padding:14px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;color:#888;border-bottom:3px solid transparent}
.nav-tab.active{color:#4A3AB7;border-bottom-color:#4A3AB7}
.main-wrap{max-width:960px;margin:2rem auto;padding:0 1rem;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:640px){.main-wrap{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #ebebeb;border-radius:16px;padding:1.5rem}
.card-title{font-size:15px;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;background:#4A3AB7;display:inline-block}
.event-banner{background:linear-gradient(135deg,#4A3AB7 0%,#7B68EE 100%);border-radius:12px;padding:1.5rem;color:#fff;margin-bottom:1.25rem}
.event-name{font-size:22px;font-weight:700;margin-bottom:4px}
.event-dept{font-size:13px;opacity:.9}
.detail-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-icon{min-width:22px}
.detail-label{color:#888;min-width:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.detail-val{font-weight:600}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:#e6f7ee;color:#1a7a45}
.badge-amber{background:#fff3e0;color:#b35a00}
.badge-red{background:#fdecea;color:#b71c1c}
.avail-bar{height:6px;background:#eee;border-radius:3px;margin-top:8px;overflow:hidden}
.avail-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#4A3AB7,#7B68EE);transition:width .4s}
.form-field{margin-bottom:1rem}
.form-field label{display:block;font-size:11px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-field input,.form-field select{width:100%;padding:10px 13px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
.form-field input:focus,.form-field select:focus{border-color:#4A3AB7;box-shadow:0 0 0 3px rgba(74,58,183,.1)}
.form-field input.error-field,.form-field select.error-field{border-color:#e74c3c;background:#fff8f8}
.field-err{color:#c0392b;font-size:11px;margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-book{width:100%;padding:13px;background:linear-gradient(135deg,#4A3AB7,#7B68EE);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;margin-top:.5rem}
.btn-book:disabled{opacity:.4;cursor:not-allowed}
.btn-reset{width:100%;padding:10px;background:none;border:1.5px solid #e0e0e0;color:#888;border-radius:9px;font-size:14px;cursor:pointer;margin-top:8px}
.global-err{color:#c0392b;font-size:13px;margin-bottom:.5rem;background:#fff0f0;padding:10px 12px;border-radius:8px;border-left:3px solid #e74c3c}
.confirm-wrap{max-width:560px;margin:40px auto;padding:0 1rem}
.confirm-card{background:#fff;border:1px solid #ebebeb;border-radius:18px;padding:2.5rem 2rem;text-align:center}
.success-ring{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#27ae60,#2ecc71);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;color:#fff;font-size:30px}
.confirm-title{font-size:22px;font-weight:700;margin-bottom:6px}
.confirm-sub{font-size:13px;color:#888;margin-bottom:1.75rem}
.summary-table{width:100%;border-collapse:collapse;font-size:13px;text-align:left;margin-bottom:1rem}
.summary-table tr{border-bottom:1px solid #f0f0f0}
.summary-table td{padding:9px 6px}
.summary-table td:first-child{color:#888;font-size:11px;font-weight:700;text-transform:uppercase}
.summary-table td:last-child{text-align:right;font-weight:600}
.total-row td{font-size:16px;font-weight:800;color:#4A3AB7;border-top:2px solid #e0e0e0;border-bottom:none;padding-top:14px}
.ref-badge{display:inline-block;background:#f0eeff;color:#3C3489;border-radius:8px;padding:6px 16px;font-size:13px;font-weight:700;letter-spacing:.05em}
.confirm-btns{display:flex;gap:10px;margin-top:1.5rem}
.btn-pdf{flex:1;padding:11px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer}
.btn-print{flex:1;padding:11px;background:linear-gradient(135deg,#27ae60,#219a52);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer}
.btn-new-booking{width:100%;padding:12px;background:linear-gradient(135deg,#4A3AB7,#7B68EE);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px}
.hist-wrap{max-width:960px;margin:2rem auto;padding:0 1rem}
.hist-card{background:#fff;border:1px solid #ebebeb;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.hist-name{font-size:14px;font-weight:700}
.hist-meta{font-size:12px;color:#888;margin-top:3px}
.hist-ref{font-size:11px;color:#4A3AB7;font-weight:700;margin-top:3px}
.hist-amt{font-size:18px;font-weight:800;color:#4A3AB7}
.hist-qty{font-size:11px;color:#888;margin-top:2px;text-align:right}
.empty-state{text-align:center;padding:4rem 2rem;color:#aaa}
.empty-icon{font-size:48px;display:block;margin-bottom:1rem}
.admin-wrap{max-width:960px;margin:2rem auto;padding:0 1rem}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem}
@media(max-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#fff;border:1px solid #ebebeb;border-radius:14px;padding:1.25rem;text-align:center}
.stat-num{font-size:30px;font-weight:800;color:#4A3AB7}
.stat-label{font-size:11px;color:#888;margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.admin-table-wrap{background:#fff;border:1px solid #ebebeb;border-radius:16px;overflow:hidden}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{background:#f8f7ff;padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #ebebeb}
.admin-table td{padding:12px 16px;border-bottom:1px solid #f5f5f5}
.admin-table tr:last-child td{border-bottom:none}
.search-bar{width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:14px;outline:none;margin-bottom:1rem}
.btn-export{padding:9px 18px;background:#4A3AB7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const DEMO_USERS = [
  {email:'student@college.edu',pass:'1234',role:'Student',name:'Ravi Kumar'},
  {email:'faculty@college.edu',pass:'1234',role:'Faculty',name:'Dr. Priya Nair'},
  {email:'admin@college.edu',pass:'admin123',role:'Admin',name:'Admin'}
];
const TOTAL_TICKETS = 50;
const PRICE = 150;
const DEPTS = ['CSE','ECE','EEE','MECH','CIVIL','IT','MBA','MCA','AIDS'];

function genRef(){ return 'TF25-'+Math.random().toString(36).substring(2,8).toUpperCase(); }
function loadBookings(){ try{ return JSON.parse(localStorage.getItem('tf_bookings')||'[]'); }catch{return [];} }
function saveBookings(b){ localStorage.setItem('tf_bookings',JSON.stringify(b)); }

// ─────────────── LOGIN ───────────────
function LoginPage({onLogin}){
  const [form,setForm] = useState({email:'',pass:'',role:''});
  const [errs,setErrs] = useState({});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const validate = () => {
    const e={};
    if(!form.email) e.email='Email is required.';
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email='Enter a valid email address.';
    if(!form.pass) e.pass='Password is required.';
    if(!form.role) e.role='Please select your role.';
    return e;
  };
  const submit = () => {
    const e=validate(); setErrs(e);
    if(Object.keys(e).length) return;
    const user=DEMO_USERS.find(u=>u.email===form.email&&u.pass===form.pass);
    if(!user){setErrs({global:'Invalid credentials. Please try again.'});return;}
    onLogin(user);
  };
  return (
    <div className="login-bg">
      <div className="login-card">
        <div className="brand">
          <div className="brand-icon">TF</div>
          <h1>TechFest 2025</h1>
          <p>Department Event Ticket Booking System</p>
        </div>
        <div className="field">
          <label>Email ID</label>
          <input className={errs.email?'err':''} value={form.email} onChange={e=>set('email',e.target.value)} placeholder="you@college.edu" onKeyDown={e=>e.key==='Enter'&&submit()} />
          {errs.email&&<div className="err-text">{errs.email}</div>}
        </div>
        <div className="field">
          <label>Password</label>
          <input type="password" className={errs.pass?'err':''} value={form.pass} onChange={e=>set('pass',e.target.value)} placeholder="Enter password" onKeyDown={e=>e.key==='Enter'&&submit()} />
          {errs.pass&&<div className="err-text">{errs.pass}</div>}
        </div>
        <div className="field">
          <label>Role</label>
          <select className={errs.role?'err':''} value={form.role} onChange={e=>set('role',e.target.value)}>
            <option value="">Select your role</option>
            <option>Student</option><option>Faculty</option><option>Admin</option>
          </select>
          {errs.role&&<div className="err-text">{errs.role}</div>}
        </div>
        {errs.global&&<div className="err-text" style={{marginBottom:'8px',fontSize:'13px'}}>{errs.global}</div>}
        <button className="btn-primary" onClick={submit}>Sign In →</button>
        <div className="demo-box">
          <strong>Demo Credentials</strong>
          Student → <code>student@college.edu</code> / <code>1234</code><br/>
          Faculty → <code>faculty@college.edu</code> / <code>1234</code><br/>
          Admin &nbsp;&nbsp;→ <code>admin@college.edu</code> / <code>admin123</code>
        </div>
      </div>
    </div>
  );
}

// ─────────────── EVENT DETAILS ───────────────
function EventDetails({available}){
  const pct = (available/TOTAL_TICKETS*100).toFixed(0);
  const badgeClass = available===0?'badge badge-red':available<=10?'badge badge-amber':'badge badge-green';
  const badgeText = available===0?'Sold Out':available<=10?'Few Left':'Available';
  return (
    <div className="card">
      <div className="card-title"><span className="dot"></span>Event Details</div>
      <div className="event-banner">
        <div className="event-name">TechFest 2025</div>
        <div className="event-dept">Dept. of Computer Science & Engineering</div>
      </div>
      {[
        ['📅','Date & Time','20 April 2025 | 10:00 AM'],
        ['📍','Venue','Main Auditorium, Block A'],
        ['💰','Price','₹150 per ticket'],
        ['👥','Organiser','CSE Tech Club'],
        ['📌','Category','Technical Fest – Open to All'],
        ['📞','Contact','techclub@college.edu'],
      ].map(([icon,label,val])=>(
        <div className="detail-row" key={label}>
          <span className="detail-icon">{icon}</span>
          <span className="detail-label">{label}</span>
          <span className="detail-val">{val}</span>
        </div>
      ))}
      <div className="detail-row">
        <span className="detail-icon">🪑</span>
        <span className="detail-label">Available</span>
        <span className="detail-val">{available} / {TOTAL_TICKETS} &nbsp;<span className={badgeClass}>{badgeText}</span></span>
      </div>
      <div className="avail-bar"><div className="avail-fill" style={{width:pct+'%'}}></div></div>
    </div>
  );
}

// ─────────────── BOOKING FORM ───────────────
function BookingForm({available,userEmail,onBook}){
  const [form,setForm]=useState({name:'',email:userEmail||'',phone:'',dept:'',qty:''});
  const [errs,setErrs]=useState({});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const reset=()=>setForm({name:'',email:userEmail||'',phone:'',dept:'',qty:''})&&setErrs({});
  const validate=()=>{
    const e={};
    if(!form.name.trim()) e.name='Full name is required.';
    if(!form.email.trim()) e.email='Email is required.';
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email='Enter a valid email address.';
    if(!form.phone.trim()) e.phone='Phone number is required.';
    else if(!/^\d{10}$/.test(form.phone)) e.phone='Enter a valid 10-digit phone number.';
    if(!form.dept) e.dept='Please select your department.';
    const qty=parseInt(form.qty);
    if(!form.qty||isNaN(qty)||qty<1) e.qty='Enter a positive number of tickets.';
    else if(qty>10) e.qty='Maximum 10 tickets per booking.';
    else if(qty>available) e.global='Only '+available+' ticket(s) remaining. You cannot book '+qty+'.';
    return e;
  };
  const submit=()=>{
    const e=validate(); setErrs(e);
    if(Object.keys(e).length) return;
    const qty=parseInt(form.qty);
    onBook({...form,qty,total:qty*PRICE,ref:genRef(),date:new Date().toLocaleString()});
    reset();
  };
  return (
    <div className="card">
      <div className="card-title"><span className="dot"></span>Book Your Tickets</div>
      <div className="form-field">
        <label>Full Name *</label>
        <input className={errs.name?'error-field':''} value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Enter your full name"/>
        {errs.name&&<div className="field-err">{errs.name}</div>}
      </div>
      <div className="form-field">
        <label>Email ID *</label>
        <input className={errs.email?'error-field':''} value={form.email} onChange={e=>set('email',e.target.value)} placeholder="name@college.edu"/>
        {errs.email&&<div className="field-err">{errs.email}</div>}
      </div>
      <div className="form-field">
        <label>Phone Number *</label>
        <input className={errs.phone?'error-field':''} value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="10-digit mobile number"/>
        {errs.phone&&<div className="field-err">{errs.phone}</div>}
      </div>
      <div className="form-row">
        <div className="form-field">
          <label>Department *</label>
          <select className={errs.dept?'error-field':''} value={form.dept} onChange={e=>set('dept',e.target.value)}>
            <option value="">Select dept</option>
            {DEPTS.map(d=><option key={d}>{d}</option>)}
          </select>
          {errs.dept&&<div className="field-err">{errs.dept}</div>}
        </div>
        <div className="form-field">
          <label>No. of Tickets *</label>
          <input type="number" className={errs.qty?'error-field':''} value={form.qty} onChange={e=>set('qty',e.target.value)} min="1" max="10" placeholder="1"/>
          {errs.qty&&<div className="field-err">{errs.qty}</div>}
        </div>
      </div>
      {errs.global&&<div className="global-err">{errs.global}</div>}
      <button className="btn-book" disabled={available===0} onClick={submit}>✔ Confirm Booking</button>
      <button className="btn-reset" onClick={()=>{setForm({name:'',email:userEmail||'',phone:'',dept:'',qty:''});setErrs({});}}>↺ Reset Form</button>
    </div>
  );
}

// ─────────────── CONFIRMATION ───────────────
function ConfirmPage({booking,onMore,onLogout,user}){
  const init=user.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const downloadPDF=()=>{
    if(!window.jspdf){alert('PDF library loading, please try again.');return;}
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a5'});
    const W=148,pw=10;
    doc.setFillColor(74,58,183); doc.rect(0,0,W,42,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(22); doc.setFont('helvetica','bold');
    doc.text('TechFest 2025',W/2,16,{align:'center'});
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text('Dept. of Computer Science & Engineering',W/2,23,{align:'center'});
    doc.text('Main Auditorium, Block A  |  20 April 2025, 10:00 AM',W/2,29,{align:'center'});
    doc.setFontSize(11); doc.setFont('helvetica','bold');
    doc.text('E-TICKET',W/2,38,{align:'center'});
    doc.setTextColor(30,30,30);
    const fields=[['Booking Reference',booking.ref],['Name',booking.name],['Email',booking.email],
      ['Phone',booking.phone],['Department',booking.dept],['Tickets',String(booking.qty)],
      ['Price/Ticket','Rs.'+PRICE],['Total Amount','Rs.'+booking.total],['Date',booking.date]];
    let y=52;
    fields.forEach(([label,val])=>{
      doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(130,130,130);
      doc.text(label.toUpperCase(),pw,y);
      doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30);
      doc.text(val,pw,y+5); y+=13;
    });
    doc.setFillColor(240,238,255); doc.rect(pw,y+4,W-pw*2,12,'F');
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(74,58,183);
    doc.text('Official e-ticket. Please carry this to the event.',W/2,y+11,{align:'center'});
    doc.save('TechFest2025_'+booking.ref+'.pdf');
  };
  const print=()=>window.print();
  return (
    <div>
      <div className="header">
        <h2>🎟️ TechFest 2025 – Ticket Booking</h2>
        <div className="user-pill">
          <div className="avatar">{init}</div>
          <span>{user.name} ({user.role})</span>
          <button className="logout-btn" onClick={onLogout}>Logout</button>
        </div>
      </div>
      <div className="confirm-wrap">
        <div className="confirm-card">
          <div className="success-ring">✓</div>
          <div className="confirm-title">Booking Confirmed! 🎉</div>
          <div className="confirm-sub">Your tickets are booked. See you at TechFest 2025!</div>
          <table className="summary-table">
            {[['Attendee',booking.name],['Email',booking.email],['Phone',booking.phone],
              ['Department',booking.dept],['Event','TechFest 2025'],
              ['Venue','Main Auditorium, Block A'],['Date & Time','20 April 2025, 10:00 AM'],
              ['Tickets Booked',booking.qty],['Price per Ticket','₹'+PRICE]].map(([k,v])=>(
              <tr key={k}><td>{k}</td><td>{v}</td></tr>
            ))}
            <tr className="total-row"><td>Total Amount</td><td>₹{booking.total}</td></tr>
          </table>
          <div className="ref-badge">Ref: {booking.ref}</div>
          <div className="confirm-btns">
            <button className="btn-pdf" onClick={downloadPDF}>⬇ Download PDF</button>
            <button className="btn-print" onClick={print}>🖨 Print Ticket</button>
          </div>
          <button className="btn-new-booking" onClick={onMore}>+ Book More Tickets</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────── HISTORY ───────────────
function HistoryTab({bookings,userEmail,isAdmin}){
  const mine=isAdmin?bookings:bookings.filter(b=>b.user===userEmail);
  if(mine.length===0) return (
    <div className="hist-wrap">
      <div className="card"><div className="empty-state"><span className="empty-icon">🎫</span>No bookings yet.</div></div>
    </div>
  );
  return (
    <div className="hist-wrap">
      <div className="card">
        <div className="card-title"><span className="dot"></span>My Booking History</div>
        {mine.map(b=>(
          <div className="hist-card" key={b.ref}>
            <div>
              <div className="hist-name">{b.name} — {b.dept}</div>
              <div className="hist-meta">{b.qty} ticket(s) · {b.email} · {b.phone}</div>
              <div className="hist-ref">{b.ref} · {b.date}</div>
            </div>
            <div>
              <div className="hist-amt">₹{b.total}</div>
              <div className="hist-qty">{b.qty} ticket(s)</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────── ADMIN ───────────────
function AdminTab({bookings}){
  const [q,setQ]=useState('');
  const filtered=q?bookings.filter(b=>[b.name,b.email,b.ref,b.dept].some(s=>s.toLowerCase().includes(q.toLowerCase()))):bookings;
  const sold=bookings.reduce((s,b)=>s+b.qty,0);
  const revenue=bookings.reduce((s,b)=>s+b.total,0);
  const exportCSV=()=>{
    const rows=[['Ref','Name','Email','Phone','Dept','Tickets','Amount','Date']];
    bookings.forEach(b=>rows.push([b.ref,b.name,b.email,b.phone,b.dept,b.qty,'Rs.'+b.total,b.date]));
    const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download='techfest2025_bookings.csv'; a.click();
  };
  return (
    <div className="admin-wrap">
      <div className="stats-grid">
        {[['Total Bookings',bookings.length],['Tickets Sold',sold],['Revenue','₹'+revenue],['Remaining',TOTAL_TICKETS-sold]].map(([l,v])=>(
          <div className="stat-card" key={l}><div className="stat-num">{v}</div><div className="stat-label">{l}</div></div>
        ))}
      </div>
      <div className="admin-table-wrap">
        <div style={{padding:'1.25rem 1.5rem',borderBottom:'1px solid #ebebeb'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
            <div style={{fontSize:'16px',fontWeight:'700'}}>All Bookings</div>
            <button className="btn-export" onClick={exportCSV}>⬇ Export CSV</button>
          </div>
          <input className="search-bar" value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by name, email, ref…"/>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="admin-table">
            <thead><tr><th>#</th><th>Ref</th><th>Name</th><th>Email</th><th>Dept</th><th>Tickets</th><th>Amount</th><th>Date</th></tr></thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan="8" style={{textAlign:'center',padding:'2rem',color:'#aaa'}}>No bookings found.</td></tr>:
              filtered.map((b,i)=>(
                <tr key={b.ref}>
                  <td style={{color:'#aaa'}}>{i+1}</td>
                  <td style={{color:'#4A3AB7',fontWeight:'700'}}>{b.ref}</td>
                  <td><strong>{b.name}</strong></td>
                  <td style={{color:'#888'}}>{b.email}</td>
                  <td><span className="badge badge-green">{b.dept}</span></td>
                  <td style={{textAlign:'center',fontWeight:'700'}}>{b.qty}</td>
                  <td style={{fontWeight:'700',color:'#4A3AB7'}}>₹{b.total}</td>
                  <td style={{color:'#aaa',fontSize:'11px'}}>{b.date}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─────────────── MAIN APP ───────────────
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('book');
  const [bookings,setBookings]=useState(loadBookings);
  const [lastBooking,setLastBooking]=useState(null);
  const [confirmed,setConfirmed]=useState(false);

  const available = TOTAL_TICKETS - bookings.reduce((s,b)=>s+b.qty,0);

  const onLogin = u => { setUser(u); setTab('book'); };
  const onLogout = () => { setUser(null); setTab('book'); setConfirmed(false); };
  const onBook = booking => {
    const b = {...booking, user:user.email};
    const newList=[b,...bookings];
    setBookings(newList); saveBookings(newList);
    setLastBooking(b); setConfirmed(true);
  };
  const onMore = () => setConfirmed(false);

  if(!user) return <LoginPage onLogin={onLogin}/>;
  if(confirmed && lastBooking) return <ConfirmPage booking={lastBooking} onMore={onMore} onLogout={onLogout} user={user}/>;

  const init=user.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  return (
    <div>
      <div className="header">
        <h2>🎟️ TechFest 2025 – Ticket Booking</h2>
        <div className="user-pill">
          <div className="avatar">{init}</div>
          <span>{user.name} ({user.role})</span>
          <button className="logout-btn" onClick={onLogout}>Logout</button>
        </div>
      </div>
      <div className="nav-bar">
        {[['book','🎫 Book Tickets'],['history','📋 My Bookings'],...(user.role==='Admin'?[['admin','⚙️ Admin Panel']]:[])].map(([id,label])=>(
          <button key={id} className={'nav-tab'+(tab===id?' active':'')} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>
      {tab==='book' && (
        <div className="main-wrap">
          <EventDetails available={available}/>
          <BookingForm available={available} userEmail={user.email} onBook={onBook}/>
        </div>
      )}
      {tab==='history' && <HistoryTab bookings={bookings} userEmail={user.email} isAdmin={user.role==='Admin'}/>}
      {tab==='admin' && user.role==='Admin' && <AdminTab bookings={bookings}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
